name: Ping endpoint on update

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call endpoint
        run: |
          curl -X POST "https://n8n.mooreai.net/webhook/0ce64233-18a2-4cac-b48f-0e6a518f8d9c" \
            -H "Content-Type: application/json" \
            -d '{
              "repository": "${{ github.repository }}",
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}"
            }'
